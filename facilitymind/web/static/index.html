<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FacilityMind Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .pulse { animation: p 1.2s ease-in-out infinite; }
    @keyframes p { 0%,100% { opacity: 1; } 50% { opacity: .45; } }
    .fade-in { animation: f .35s ease-out; }
    @keyframes f { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .conn { flex: 1; height: 2px; background: #e2e8f0; }
    .conn.on { background: #22c55e; }
    .tab.active { color: #4f46e5; border-color: #4f46e5; }
    .tab { border-bottom: 2px solid transparent; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <header class="border-b border-slate-200 bg-white">
    <div class="max-w-6xl mx-auto px-5 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-lg font-semibold text-slate-900">FacilityMind Dashboard</h1>
        <p class="text-xs text-slate-500 mt-0.5">设施管理多智能体运营中枢 · 工单全链路实时可视化</p>
      </div>
      <div class="flex items-center gap-3 text-xs">
        <span id="mode-badge" class="px-2.5 py-1 rounded-full bg-slate-100 text-slate-600">模式加载中…</span>
        <a href="https://github.com/digitsouler/facility-multiagents" target="_blank"
           class="px-2.5 py-1 rounded-full border border-slate-200 text-slate-600 hover:bg-slate-100">GitHub</a>
      </div>
    </div>
    <div class="max-w-6xl mx-auto px-5 flex gap-6 text-sm border-t border-slate-100">
      <button id="tab-pipeline" class="tab active py-2.5 font-medium">流水线</button>
      <button id="tab-eval" class="tab py-2.5 font-medium text-slate-500">评估报告</button>
    </div>
  </header>

  <!-- 流水线视图 -->
  <main id="view-pipeline" class="max-w-6xl mx-auto px-5 py-5 grid grid-cols-1 lg:grid-cols-3 gap-5">
    <!-- 左栏：工单看板 -->
    <section class="lg:col-span-1">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-sm font-semibold text-slate-700">工单看板</h2>
        <span id="ticket-count" class="text-xs text-slate-400"></span>
      </div>
      <div id="ticket-list" class="space-y-2 max-h-[72vh] overflow-y-auto pr-1"></div>
    </section>

    <!-- 右栏：流水线 + 结果 -->
    <section class="lg:col-span-2 space-y-4">
      <div id="run-bar" class="bg-white border border-slate-200 rounded-xl p-4 hidden">
        <div class="flex items-start justify-between gap-3">
          <div class="min-w-0">
            <div class="text-sm font-semibold text-slate-900" id="sel-title">—</div>
            <div class="text-xs text-slate-500 mt-1 break-words" id="sel-raw">—</div>
          </div>
          <button id="run-btn"
            class="shrink-0 px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium hover:bg-indigo-700 disabled:opacity-50">
            运行流水线
          </button>
        </div>
        <label class="mt-3 flex items-center gap-2 text-xs text-slate-600 cursor-pointer select-none">
          <input id="auto-toggle" type="checkbox" checked class="w-4 h-4 accent-indigo-600" />
          自动批准（关闭后高成本派单将在网页内等待人工确认 · M3）
        </label>
        <label class="mt-1 flex items-center gap-2 text-xs text-slate-600 cursor-pointer select-none">
          <input id="ensemble-toggle" type="checkbox" class="w-4 h-4 accent-indigo-600" />
          多模型集成 Ensemble（诊断扇出多个模型并合成 · 需配置 ≥2 个模型 Key）
        </label>
      </div>

      <!-- 流水线 stepper -->
      <div id="pipeline" class="bg-white border border-slate-200 rounded-xl p-4 hidden">
        <h2 class="text-sm font-semibold text-slate-700 mb-4">流水线执行</h2>
        <div id="steps" class="flex items-center"></div>
        <div id="step-details" class="mt-4 space-y-2"></div>
      </div>

      <!-- 结果面板 -->
      <div id="result" class="bg-white border border-slate-200 rounded-xl p-4 hidden"></div>

      <!-- 空状态 -->
      <div id="empty" class="text-center text-slate-400 text-sm py-24">
        从左侧选择一张工单，点击「运行流水线」查看多智能体实时协作
      </div>
    </section>
  </main>

  <!-- 评估报告视图 -->
  <main id="view-eval" class="max-w-6xl mx-auto px-5 py-5 hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-base font-semibold text-slate-800">评估 Harness 报告</h2>
      <button id="eval-reload"
        class="px-3 py-1.5 rounded-lg border border-slate-200 text-sm text-slate-600 hover:bg-slate-100">刷新</button>
    </div>
    <div id="eval-cards" class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5"></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-5">
      <div class="bg-white border border-slate-200 rounded-xl p-4">
        <h3 class="text-sm font-semibold text-slate-700 mb-3">核心达成率</h3>
        <div class="relative" style="height:240px"><canvas id="chart-rates"></canvas></div>
      </div>
      <div class="bg-white border border-slate-200 rounded-xl p-4">
        <h3 class="text-sm font-semibold text-slate-700 mb-3">逐工单处置成本（¥）</h3>
        <div class="relative" style="height:240px"><canvas id="chart-cost"></canvas></div>
      </div>
    </div>
    <div class="bg-white border border-slate-200 rounded-xl p-4">
      <h3 class="text-sm font-semibold text-slate-700 mb-3">逐工单明细</h3>
      <div id="eval-table" class="overflow-x-auto"></div>
    </div>
  </main>

  <script>
    const ORDER = ["intake", "diagnose", "dispatch", "approval", "qa", "report"];
    const LABELS = { intake: "受理", diagnose: "诊断", dispatch: "派单", approval: "人工确认", qa: "质检", report: "报告" };
    let tickets = [], selected = null, es = null;
    let evalData = null, ratesChart = null, costChart = null;

    const $ = (id) => document.getElementById(id);
    const esc = (s) => String(s ?? "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const pct = (x) => (x * 100).toFixed(1) + "%";

    /* ---------- 工单看板 ---------- */
    async function loadTickets() {
      const r = await fetch("/api/tickets");
      tickets = await r.json();
      $("ticket-count").textContent = tickets.length + " 条";
      $("ticket-list").innerHTML = tickets.map(t => `
        <div data-id="${t.id}" class="ticket cursor-pointer border border-slate-200 rounded-lg p-3 bg-white hover:border-indigo-300 hover:shadow-sm transition">
          <div class="flex items-center justify-between">
            <span class="text-xs font-semibold text-slate-900">${t.id}</span>
            <span class="text-[11px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-600">${esc(t.type_cn)}</span>
          </div>
          <div class="text-xs text-slate-600 mt-1.5 line-clamp-2">${esc(t.raw)}</div>
          <div class="text-[11px] text-slate-400 mt-1.5">${esc(t.reporter)} · ${esc(t.location_hint || "")}</div>
        </div>`).join("");
      document.querySelectorAll(".ticket").forEach(el =>
        el.addEventListener("click", () => selectTicket(el.dataset.id)));
    }

    function selectTicket(id) {
      selected = tickets.find(t => t.id === id);
      document.querySelectorAll(".ticket").forEach(el => {
        const on = el.dataset.id === id;
        el.classList.toggle("ring-2", on);
        el.classList.toggle("ring-indigo-400", on);
      });
      $("empty").classList.add("hidden");
      $("run-bar").classList.remove("hidden");
      $("sel-title").textContent = `${selected.id} · ${selected.type_cn} · ${selected.location_hint || ""}`;
      $("sel-raw").textContent = selected.raw;
      $("pipeline").classList.add("hidden");
      $("result").classList.add("hidden");
    }

    /* ---------- 流水线可视化 ---------- */
    function renderSteps(states) {
      const parts = [];
      ORDER.forEach((n, i) => {
        const st = states[n] || "pending";
        const color = st === "done" ? "bg-green-500 text-white"
          : st === "running" ? "bg-indigo-600 text-white pulse"
          : st === "interrupt" ? "bg-amber-500 text-white"
          : "bg-slate-200 text-slate-500";
        parts.push(`
          <div class="flex flex-col items-center" style="min-width:56px">
            <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-semibold ${color}">${i + 1}</div>
            <div class="text-[11px] mt-1.5 ${st === "pending" ? "text-slate-400" : "text-slate-700"}">${LABELS[n]}</div>
          </div>`);
        if (i < ORDER.length - 1) {
          const on = states[ORDER[i]] === "done";
          parts.push(`<div class="conn ${on ? "on" : ""} mx-1" style="margin-top:-16px"></div>`);
        }
      });
      $("steps").innerHTML = parts.join("");
    }

    function fmtDetail(node, data) {
      if (node === "intake" && data.ticket) {
        const t = data.ticket;
        return `类型 <b>${esc(t.type)}</b> · 紧急度 <b>${esc(t.urgency)}</b> · 位置 ${esc(t.location)}`;
      }
      if (node === "diagnose" && data.diagnosis) {
        const d = data.diagnosis;
        return `根因：${esc(d.root_cause)}；处置：${esc(d.recommended_action)}<br>预估 ¥${Math.round(d.estimated_cost || 0)} · SLA ${d.sla_hours}h · 置信度 ${(d.confidence || 0).toFixed(2)}${d.recurrence ? " · <span class='text-amber-600'>近期重复</span>" : ""}`;
      }
      if (node === "dispatch" && data.dispatch_plan) {
        const p = data.dispatch_plan;
        return `派单：<b>${esc(p.vendor)}</b>（响应 ${p.response_time_min} 分钟 / 报价 ¥${Math.round(p.cost || 0)}）<br>${esc(p.rationale)}`;
      }
      if (node === "approval" && data.approval) {
        const a = data.approval;
        return `[${esc(a.status)}] 批准 <b>${a.approved ? "是" : "否"}</b> · 审批人 ${esc(a.approver)}<br>${esc(a.note)}`;
      }
      if (node === "qa") {
        const q = data.qa || {}, e = data.execution || {};
        return `质检 <b>${q.passed ? "通过" : "未通过"}</b> · 得分 ${q.score ?? "—"}<br>实际响应 ${e.actual_response_min ?? "—"} 分钟 · 资质核验 ${e.cert_verified ? "✓" : "✗"} · 影像留痕 ${e.photos_uploaded ? "✓" : "✗"}${(q.issues && q.issues.length) ? "<br>问题：" + esc(q.issues.join("、")) : ""}`;
      }
      if (node === "report" && data.report) {
        const r = data.report;
        const recs = (r.recommendations || []).map(x => `<li>${esc(x)}</li>`).join("");
        return `结案：${esc(r.summary)}${recs ? `<ul class='list-disc ml-5 mt-1'>${recs}</ul>` : ""}`;
      }
      return "";
    }

    function submitDecision(approved) {
      const note = $("approve-note") ? $("approve-note").value : "";
      const btnA = $("btn-approve"), btnR = $("btn-reject");
      if (btnA) btnA.disabled = true;
      if (btnR) btnR.disabled = true;
      fetch("/api/approve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ticket_id: selected.id, approved, note })
      }).then(() => {
        const row = document.createElement("div");
        row.className = "fade-in text-xs bg-indigo-50 border border-indigo-200 rounded-lg px-3 py-2 text-indigo-800";
        row.textContent = approved ? "✓ 已批准，流水线继续…" : "✗ 已驳回，流水线继续…";
        $("step-details").appendChild(row);
      });
    }

    function run() {
      if (!selected || es) return;
      const auto = $("auto-toggle").checked ? 1 : 0;
      const ensemble = $("ensemble-toggle").checked ? 1 : 0;
      $("run-btn").disabled = true;
      $("run-btn").textContent = "运行中…";
      $("pipeline").classList.remove("hidden");
      $("result").classList.add("hidden");
      $("step-details").innerHTML = "";

      const states = {};
      ORDER.forEach(n => states[n] = "pending");
      states[ORDER[0]] = "running";
      renderSteps(states);

      es = new EventSource(`/api/stream?id=${encodeURIComponent(selected.id)}&auto=${auto}&ensemble=${ensemble}&pace=0.5`);

      es.addEventListener("start", () => { ORDER.forEach(n => states[n] = "pending"); states[ORDER[0]] = "running"; renderSteps(states); });

      es.addEventListener("node", (ev) => {
        const { node, label, data } = JSON.parse(ev.data);
        states[node] = "done";
        const idx = ORDER.indexOf(node);
        if (idx + 1 < ORDER.length) states[ORDER[idx + 1]] = "running";
        renderSteps(states);
        const detail = fmtDetail(node, data);
        if (detail) {
          const row = document.createElement("div");
          row.className = "fade-in text-xs bg-slate-50 border border-slate-100 rounded-lg px-3 py-2";
          row.innerHTML = `<span class="font-semibold text-slate-700">${label}</span><span class="text-slate-600"> — ${detail}</span>`;
          $("step-details").appendChild(row);
        }
      });

      es.addEventListener("interrupt", (ev) => {
        const { value } = JSON.parse(ev.data);
        states["approval"] = "interrupt";
        renderSteps(states);
        const p = value.plan || {};
        const card = document.createElement("div");
        card.className = "fade-in text-xs bg-amber-50 border border-amber-200 rounded-lg px-3 py-3 text-amber-900";
        card.innerHTML = `
          <div class="font-semibold text-amber-800 mb-1">⏸ 需人工确认</div>
          <div class="text-amber-800">${esc(value.prompt || "")}</div>
          <div class="mt-2 bg-white/60 rounded px-2 py-1.5">
            派单：<b>${esc(p.vendor || "—")}</b> · 报价 <b>¥${Math.round(p.cost || 0)}</b> · 响应 ${p.response_time_min || "—"} 分钟
          </div>
          <textarea id="approve-note" rows="2" placeholder="审批意见（可选）"
            class="mt-2 w-full text-xs border border-amber-300 rounded px-2 py-1 focus:outline-none focus:ring-1 focus:ring-amber-400"></textarea>
          <div class="flex gap-2 mt-1">
            <button id="btn-approve" class="px-3 py-1 rounded bg-green-600 text-white text-xs font-medium hover:bg-green-700">批准</button>
            <button id="btn-reject" class="px-3 py-1 rounded bg-red-600 text-white text-xs font-medium hover:bg-red-700">驳回</button>
          </div>`;
        $("step-details").appendChild(card);
        $("btn-approve").onclick = () => submitDecision(true);
        $("btn-reject").onclick = () => submitDecision(false);
      });

      es.addEventListener("done", (ev) => {
        const { result } = JSON.parse(ev.data);
        renderResult(result);
        closeES();
      });

      es.addEventListener("error", (ev) => {
        let msg = "连接中断";
        try { msg = JSON.parse(ev.data).message; } catch (_) {}
        const row = document.createElement("div");
        row.className = "text-xs bg-red-50 border border-red-200 rounded-lg px-3 py-2 text-red-700";
        row.textContent = "运行出错：" + msg;
        $("step-details").appendChild(row);
        closeES();
      });
    }

    function closeES() {
      if (es) { es.close(); es = null; }
      $("run-btn").disabled = false;
      $("run-btn").textContent = "重新运行";
    }

    function renderResult(r) {
      const d = r.diagnosis || {}, p = r.dispatch_plan || {}, a = r.approval || {}, q = r.qa || {}, rp = r.report || {};
      const card = (title, body) => `<div class="border border-slate-100 rounded-lg p-3 bg-slate-50">
        <div class="text-xs font-semibold text-slate-500 mb-1">${title}</div><div class="text-sm text-slate-800">${body}</div></div>`;
      $("result").innerHTML = `
        <h2 class="text-sm font-semibold text-slate-700 mb-3">结案结果</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
          ${card("诊断", `${esc(d.root_cause || "—")}<div class='text-xs text-slate-500 mt-1'>预估 ¥${Math.round(d.estimated_cost || 0)} · SLA ${d.sla_hours || "—"}h · 置信度 ${(d.confidence || 0).toFixed(2)}</div>`)}
          ${card("派单", `${esc(p.vendor || "—")}<div class='text-xs text-slate-500 mt-1'>响应 ${p.response_time_min || "—"} 分钟 · 报价 ¥${Math.round(p.cost || 0)}</div>`)}
          ${card("人工确认", `${a.approved ? "<span class='text-green-600'>已批准</span>" : "<span class='text-red-600'>驳回/未批</span>"}<div class='text-xs text-slate-500 mt-1'>${esc(a.status || "")} · ${esc(a.approver || "")}</div>`)}
          ${card("质检", `${q.passed ? "<span class='text-green-600'>通过</span>" : "<span class='text-red-600'>未通过</span>"} · 得分 ${q.score ?? "—"}<div class='text-xs text-slate-500 mt-1'>${(q.issues && q.issues.length) ? "问题：" + esc(q.issues.join("、")) : "无遗留问题"}</div>`)}
        </div>
        ${rp.summary ? `<div class="mt-3">${card("复盘报告", `${esc(rp.summary)}${(rp.recommendations || []).length ? `<ul class='list-disc ml-5 mt-1 text-xs text-slate-600'>${rp.recommendations.map(x => `<li>${esc(x)}</li>`).join("")}</ul>` : ""}`)}</div>` : ""}`;
      $("result").classList.remove("hidden");
    }

    /* ---------- 评估报告（M4） ---------- */
    async function loadEval(force) {
      if (evalData && !force) { renderEval(evalData); return; }
      $("eval-cards").innerHTML = `<div class="col-span-full text-sm text-slate-400">正在批量运行评估 harness…（约需数秒）</div>`;
      try {
        const r = await fetch("/api/eval");
        evalData = await r.json();
        renderEval(evalData);
      } catch (e) {
        $("eval-cards").innerHTML = `<div class="col-span-full text-sm text-red-600">评估接口出错：${esc(e)}</div>`;
      }
    }

    function renderEval(data) {
      const m = data.metrics, recs = data.records || [];
      const card = (t, v, sub) => `<div class="bg-white border border-slate-200 rounded-xl p-3">
        <div class="text-xs text-slate-500">${t}</div>
        <div class="text-lg font-semibold text-slate-900 mt-0.5">${v}</div>
        ${sub ? `<div class="text-[11px] text-slate-400 mt-0.5">${sub}</div>` : ""}</div>`;
      $("eval-cards").innerHTML = [
        card("任务完成率", pct(m.completion_rate), `共 ${m.total} 单 · 模式：${m.mode}`),
        card("QA 通过率", pct(m.qa_pass_rate), "质检项全过"),
        card("SLA 达成率", pct(m.sla_rate), "响应≤SLA 时限"),
        card("需人工确认比例", pct(m.approval_required_rate), "成本超阈值"),
        card("总处置成本", "¥" + Math.round(m.total_cost), `均值 ¥${Math.round(m.avg_cost)}/单`),
        card("平均步骤数", m.avg_steps.toFixed(1), "经 Agent 节点"),
        card("Token 消耗", m.total_tokens, `LLM 调用 ${m.total_llm_calls} 次`),
        card("平均 LLM 调用", m.total_llm_calls ? (m.total_llm_calls / m.total).toFixed(1) : "0", "每单"),
      ].join("");

      // 图表
      if (ratesChart) ratesChart.destroy();
      ratesChart = new Chart($("chart-rates"), {
        type: "bar",
        data: {
          labels: ["完成率", "QA 通过率", "SLA 达成率", "需确认比例"],
          datasets: [{
            label: "比率",
            data: [m.completion_rate, m.qa_pass_rate, m.sla_rate, m.approval_required_rate],
            backgroundColor: ["#22c55e", "#3b82f6", "#8b5cf6", "#f59e0b"],
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, max: 1, ticks: { callback: (v) => (v * 100) + "%" } } },
          plugins: { legend: { display: false } },
        },
      });

      if (costChart) costChart.destroy();
      costChart = new Chart($("chart-cost"), {
        type: "bar",
        data: {
          labels: recs.map(r => r.id),
          datasets: [{
            label: "处置成本",
            data: recs.map(r => Math.round(r.cost || 0)),
            backgroundColor: recs.map(r => r.approval_required ? "#f59e0b" : "#60a5fa"),
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          scales: { y: { beginAtZero: true, ticks: { callback: (v) => "¥" + v } } },
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => "¥" + c.parsed.y } } },
        },
      });

      // 明细表
      const head = `<tr class="text-slate-500 border-b border-slate-200">
        <th class="text-left py-1.5 pr-2">工单</th><th class="text-left">类型</th><th class="text-left">紧急度</th>
        <th class="text-right">成本</th><th class="text-center">需确认</th><th class="text-center">完成</th>
        <th class="text-center">QA</th><th class="text-center">SLA</th><th class="text-right">步骤</th><th class="text-right">Token</th></tr>`;
      const rows = recs.map(r => `<tr class="border-b border-slate-100">
        <td class="py-1.5 pr-2 font-medium text-slate-700">${r.id}</td>
        <td>${esc(r.type)}</td><td>${esc(r.urgency)}</td>
        <td class="text-right">¥${Math.round(r.cost || 0)}</td>
        <td class="text-center">${r.approval_required ? "是" : "否"}</td>
        <td class="text-center">${r.completed ? "✓" : "✗"}</td>
        <td class="text-center">${r.qa_passed ? "✓" : "✗"}</td>
        <td class="text-center">${r.sla_met ? "✓" : "✗"}</td>
        <td class="text-right">${r.steps}</td>
        <td class="text-right">${r.tokens}</td></tr>`).join("");
      $("eval-table").innerHTML = `<table class="w-full text-xs">${head}${rows}</table>`;
    }

    /* ---------- Tab 切换 ---------- */
    function switchTab(which) {
      const onP = which === "pipeline";
      $("view-pipeline").classList.toggle("hidden", !onP);
      $("view-eval").classList.toggle("hidden", onP);
      $("tab-pipeline").classList.toggle("active", onP);
      $("tab-eval").classList.toggle("active", !onP);
      $("tab-pipeline").classList.toggle("text-slate-500", !onP);
      $("tab-eval").classList.toggle("text-slate-500", onP);
      if (!onP) loadEval(false);
    }
    $("tab-pipeline").addEventListener("click", () => switchTab("pipeline"));
    $("tab-eval").addEventListener("click", () => switchTab("eval"));
    $("eval-reload").addEventListener("click", () => loadEval(true));

    /* ---------- 绑定 ---------- */
    $("run-btn").addEventListener("click", run);
    (async () => {
      $("mode-badge").textContent = "规则/LLM 自动切换";
      $("mode-badge").className = "px-2.5 py-1 rounded-full bg-emerald-50 text-emerald-700";
    })();
    loadTickets();
  </script>
</body>
</html>
